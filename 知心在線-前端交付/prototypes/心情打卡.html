<!DOCTYPE html>
<html lang="zh-Hans"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知心在線 · 心情打卡（優化版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --teal:#14C2BC; --teal-l:#54D6CF; --teal-d:#0A9C97; --sprout-d:#5f9e36; --ink:#2C4A48; --ink2:#6E8C8A; --ink3:#A6C2C0; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ font-family:"Noto Sans SC","PingFang SC",sans-serif; color:var(--ink); margin:0; min-height:100vh; padding:30px 18px 50px; display:flex; flex-direction:column; align-items:center; gap:16px; background:radial-gradient(120% 60% at 50% 0%,#fbf3e3,#eff6e9 52%,#e6f1e5 100%); }
  .head{ text-align:center; max-width:540px; } .head h1{ font-size:18px; font-weight:900; margin:0 0 6px; color:#3c5a39; }
  .head p{ margin:0; font-size:12.5px; line-height:1.7; color:#7c8d70; } .head b{ color:var(--sprout-d); }
  .device{ width:344px; border-radius:46px; padding:9px; background:linear-gradient(160deg,#fdf8ec,#edf4e3); box-shadow:0 30px 60px rgba(120,145,85,.26); }
  .screen{ position:relative; width:326px; border-radius:38px; overflow:hidden; padding:20px 0 22px;
    background:radial-gradient(58% 26% at 50% 0%, rgba(150,205,110,.28), transparent 60%), linear-gradient(180deg,#f3f8ea,#e8f2e2); }

  /* 上方吉祥物臉即時反應 */
  .preview{ position:relative; height:128px; display:flex; align-items:center; justify-content:center; }
  .pface{ position:relative; height:118px; }
  .pface img{ height:118px; display:block; filter:drop-shadow(0 7px 9px rgba(40,90,70,.18)); animation:bob 3.4s ease-in-out infinite; transform-origin:50% 90%; }
  @keyframes bob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-6px) } }
  .preview[data-m="vgood"] img{ animation:boing 1.5s ease-in-out infinite; }
  .preview[data-m="low"] img{ animation:bob 4.6s ease-in-out infinite; }
  .preview[data-m="cry"] img{ animation:sob 2.4s ease-in-out infinite; }
  @keyframes boing{ 0%,100%{ transform:scale(1,1) } 30%{ transform:scale(1.05,.94) } 55%{ transform:scale(.96,1.06) } 80%{ transform:scale(1.02,.98) } }
  @keyframes sob{ 0%,40%,100%{ transform:translateY(0) rotate(0) } 12%{ transform:translateY(1.5px) rotate(-1.2deg) } 24%{ transform:translateY(0) rotate(1.2deg) } 36%{ transform:translateY(1.5px) rotate(-1.2deg) } }
  .fx{ position:absolute; opacity:0; pointer-events:none; }
  .tear{ width:7px; height:10px; background:linear-gradient(180deg,#cdeeff,#7cc4ee); border-radius:60% 60% 65% 35%/75% 75% 40% 40%; box-shadow:0 0 3px rgba(120,200,240,.6); }
  .heart{ font-size:14px; }
  .t1,.t2{ left:39%; top:52%; } .t3,.t4{ left:57%; top:52%; }
  .h1{ left:20%; top:30%; color:#f48aa0; } .h2{ left:64%; top:24%; color:#ffc24f; } .h3{ left:44%; top:18%; color:#7ad0c8; }
  .preview[data-m="cry"] .tear{ animation:fall 1.6s ease-in infinite; } .preview[data-m="cry"] .t2{ animation-delay:.8s; } .preview[data-m="cry"] .t3{ animation-delay:.4s; } .preview[data-m="cry"] .t4{ animation-delay:1.2s; }
  @keyframes fall{ 0%{ transform:translateY(0) scale(.5); opacity:0 } 14%{ opacity:.95 } 78%{ opacity:.95 } 100%{ transform:translateY(36px) scale(1.05); opacity:0 } }
  .preview[data-m="vgood"] .heart{ animation:rise 2s ease-out infinite; } .preview[data-m="vgood"] .h2{ animation-delay:.7s; } .preview[data-m="vgood"] .h3{ animation-delay:1.3s; }
  @keyframes rise{ 0%{ transform:translateY(8px) scale(.4); opacity:0 } 25%{ opacity:1 } 100%{ transform:translateY(-30px) scale(1); opacity:0 } }

  .card{ margin:6px 16px 0; padding:17px; border-radius:24px; background:linear-gradient(150deg,rgba(255,255,255,.85),rgba(252,250,238,.66)); border:1px solid rgba(255,255,255,.86); box-shadow:0 16px 26px -12px rgba(120,150,95,.28), inset 0 1px 0 rgba(255,255,255,.95); }
  .chead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .ctitle{ font-size:15.5px; font-weight:800; }
  .tag{ font-size:11px; font-weight:700; color:#fff; padding:5px 12px; border-radius:999px; background:radial-gradient(circle at 35% 30%,#6fded8,#14c2bc); box-shadow:0 5px 9px -2px rgba(20,180,175,.45); }
  .csub{ font-size:11px; color:var(--ink2); margin-bottom:8px; }
  .moods{ display:flex; justify-content:space-between; align-items:flex-end; margin:6px 0 16px; }
  .m{ display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; flex:1; }
  .m .f{ width:48px; height:48px; position:relative; display:grid; place-items:center; }
  .m .f img{ width:48px; height:48px; object-fit:contain; transition:.22s ease; filter:saturate(.6) opacity(.8) drop-shadow(0 3px 4px rgba(120,150,148,.26)); }
  .m .l{ font-size:10.5px; color:var(--ink3); font-weight:600; transition:.2s; }
  .m.sel .f{ width:60px; height:60px; }
  .m.sel .f::before{ content:""; position:absolute; inset:-6px -6px -2px; border-radius:50%; background:radial-gradient(circle at 50% 46%, var(--glow), transparent 70%); z-index:0; }
  .m.sel .f img{ width:60px; height:60px; position:relative; z-index:1; filter:saturate(1.05) drop-shadow(0 7px 9px rgba(40,120,90,.3)); animation:pophead .35s ease; }
  @keyframes pophead{ 0%{ transform:scale(.8) } 60%{ transform:scale(1.08) } 100%{ transform:scale(1) } }
  .m.sel .l{ font-weight:800; }
  .m[data-m="vgood"]{ --glow:rgba(245,166,35,.34); } .m[data-m="vgood"].sel .l{ color:#d98e1a; }
  .m[data-m="good"]{ --glow:rgba(143,196,74,.34); } .m[data-m="good"].sel .l{ color:#5f9e36; }
  .m[data-m="ok"]{ --glow:rgba(150,170,150,.3); } .m[data-m="ok"].sel .l{ color:#6f8d70; }
  .m[data-m="low"]{ --glow:rgba(120,150,210,.32); } .m[data-m="low"].sel .l{ color:#6f8cc8; }
  .m[data-m="cry"]{ --glow:rgba(110,160,210,.36); } .m[data-m="cry"].sel .l{ color:#5b86c0; }

  .cta{ width:100%; border:1px solid rgba(255,255,255,.45); padding:15px; border-radius:16px; cursor:pointer; color:#fff; font-weight:800; font-size:15.5px; letter-spacing:2px; background:linear-gradient(180deg,var(--teal-l),var(--teal)); box-shadow:0 10px 20px -7px rgba(20,180,175,.55), inset 0 1px 0 rgba(255,255,255,.6); display:flex; align-items:center; justify-content:center; gap:8px; transition:transform .12s; }
  .cta:active{ transform:translateY(1px); }
  .cta.done{ background:linear-gradient(180deg,#9bd47f,#6bb24a); box-shadow:0 10px 20px -7px rgba(110,180,80,.5); }
  @media (prefers-reduced-motion:reduce){ *{ animation:none!important } }
</style></head>
