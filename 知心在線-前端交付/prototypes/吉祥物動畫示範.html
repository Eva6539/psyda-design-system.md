<!DOCTYPE html><html lang="zh-Hans"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知心在線 · 吉祥物動作動畫示範</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:"Noto Sans SC","PingFang SC",sans-serif;margin:0;min-height:100vh;padding:30px 18px 50px;display:flex;flex-direction:column;align-items:center;gap:16px;color:#2C4A48;background:radial-gradient(120% 60% at 50% 0%,#fbf3e3,#eff6e9 52%,#e6f1e5 100%);}
  .head{text-align:center;max-width:560px;} .head h1{font-size:19px;font-weight:900;margin:0 0 6px;color:#3c5a39;}
  .head p{margin:0;font-size:12.5px;line-height:1.7;color:#7c8d70;} .head b{color:#5f9e36;}
  .row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  .card{width:200px;border-radius:24px;padding:16px;background:linear-gradient(150deg,rgba(255,255,255,.82),rgba(252,250,238,.64));border:1px solid rgba(255,255,255,.86);box-shadow:0 16px 26px -12px rgba(120,150,95,.28),inset 0 1px 0 rgba(255,255,255,.95);text-align:center;}
  .stage{position:relative;height:164px;display:flex;align-items:flex-end;justify-content:center;}
  .mascot{position:relative;height:150px;} .mascot>img{height:150px;display:block;}
  .cname{font-size:15px;font-weight:800;margin-top:8px;} .cdesc{font-size:11px;color:#6E8C8A;margin-top:2px;line-height:1.5;}

  /* 哭泣 */
  .cry{animation:sob 2.4s ease-in-out infinite;transform-origin:50% 100%;}
  @keyframes sob{0%,40%,100%{transform:translateY(0) rotate(0)}10%{transform:translateY(1.5px) rotate(-1deg)}20%{transform:translateY(0) rotate(1deg)}30%{transform:translateY(1.5px) rotate(-1deg)}}
  .tear{position:absolute;width:7px;height:9px;background:linear-gradient(180deg,#cdeeff,#7cc4ee);border-radius:60% 60% 65% 35%/75% 75% 40% 40%;box-shadow:0 0 3px rgba(120,200,240,.6);opacity:0;animation:fall 1.7s ease-in infinite;}
  .tear.l{left:39%;top:45%;} .tear.r{left:56%;top:45%;animation-delay:.5s;}
  .tear.l.d2{animation-delay:.9s;} .tear.r.d2{animation-delay:1.35s;}
  @keyframes fall{0%{transform:translateY(0) scale(.5);opacity:0}14%{opacity:.95}78%{opacity:.95}100%{transform:translateY(40px) scale(1.05);opacity:0}}

  /* 生氣 */
  .mad{animation:fume .24s ease-in-out infinite;}
  @keyframes fume{0%,100%{transform:translateX(0)}50%{transform:translateX(1.2px)}}
  .steam{position:absolute;width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#fff,#dfeaee);opacity:0;}
  .steam.a{left:22%;top:16%;animation:steam 1.5s ease-out infinite;}
  .steam.b{right:22%;top:14%;animation:steam 1.5s ease-out infinite .75s;}
  @keyframes steam{0%{transform:translateY(4px) scale(.5);opacity:0}25%{opacity:.85}100%{transform:translateY(-20px) scale(1.3);opacity:0}}

  /* 開心：Q彈擠壓 + 愛心上飄 */
  .joy{animation:boing 1.4s ease-in-out infinite;transform-origin:50% 100%;}
  @keyframes boing{0%,100%{transform:scale(1,1)}30%{transform:scale(1.04,.95)}55%{transform:scale(.97,1.05)}80%{transform:scale(1.02,.98)}}
  .heart{position:absolute;font-size:13px;color:#f48aa0;opacity:0;animation:rise 2s ease-out infinite;}
  .heart.h1{left:26%;top:34%;} .heart.h2{left:60%;top:28%;animation-delay:.7s;} .heart.h3{left:44%;top:40%;animation-delay:1.4s;}
  @keyframes rise{0%{transform:translateY(6px) scale(.5);opacity:0}25%{opacity:1}100%{transform:translateY(-30px) scale(1);opacity:0}}

  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style></head><body>
